<!DOCTYPE html>
<html>
<head>
    <title>Image Compressor</title>
    <style>
        body {
    font-family: Arial, sans-serif;
    text-align: center;
    margin: 0;
    padding: 0;
    background-color: #f5f5f5;
}

.container {
    max-width: 600px;
    margin: 0 auto;
    padding: 20px;
    background-color: #ffffff;
    border-radius: 5px;
    box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
}

h1 {
    margin-top: 0;
    color: #333;
}

form {
    margin-top: 20px;
}

.upload-button {
    padding: 10px 20px;
    background-color: #007bff;
    color: #ffffff;
    border: none;
    cursor: pointer;
    border-radius: 5px;
    transition: background-color 0.3s;
}

.upload-button:hover {
    background-color: #0056b3;
}

#imageInput {
    display: none;
}

.choose-file-label {
    display: inline-block;
    padding: 10px 20px;
    background-color: #007bff;
    color: #ffffff;
    border: none;
    cursor: pointer;
    border-radius: 5px;
    transition: background-color 0.3s;
}

.choose-file-label:hover {
    background-color: #0056b3;
}

.download-link {
    display: none;
    margin-top: 20px;
    color: #007bff;
    text-decoration: none;
    font-weight: bold;
    transition: color 0.3s;
}

.download-link:hover {
    color: #0056b3;
}

img {
    max-width: 100%;
    margin-top: 20px;
    display: none;
    border-radius: 5px;
    box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.2);
}

#imageScale {
    margin-top: 10px;
    width: 100%;
}

    </style>
</head>
<body>
    <div class="container">
        <h1>Image Compressor</h1>
        <form id="uploadForm" action="compress.php" method="post" enctype="multipart/form-data">
            <label for="imageInput" class="choose-file-label">Choose File</label>
            <input type="file" name="image" id="imageInput">
            <br>
            <label for="imageScale">Desired Image Scale:</label>
            <input type="range" id="imageScale" min="0.1" max="1" step="0.1" value="0.7">
            <span id="scaleValue">0.7</span>
            <br>
            <button type="button" class="upload-button" onclick="compressAndDownload()">Compress and Download</button>
        </form>
        <img id="preview" alt="Preview" class="preview">
        <script src="script.js"></script>
    </div>
</body>
</html>
